body{background:var(--beige);color:var(--ink);font-family:'Inter',sans-serif;font-size:14px;}

.header h1{font-size:18px;font-weight:700;}
.header p{font-size:11.5px;opacity:.6;margin-top:2px;}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{font-family:'Inter',sans-serif;cursor:pointer;border:none;border-radius:999px;padding:9px 16px;font-size:13px;font-weight:600;}
.btn-light{background:rgba(255,255,255,0.15);color:#fff;}
.btn-light:hover{background:rgba(255,255,255,0.25);}
.btn-green{background:var(--mv);color:#fff;}
.btn-green:hover{background:#265933;}
.wrap{max-width:1280px;margin:0 auto;padding:16px 14px 60px;display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:900px){.wrap{grid-template-columns:340px 1fr;}}
.sidebar{display:flex;flex-direction:column;gap:12px;}
.card{background:var(--card);border-radius:var(--r);box-shadow:0 3px 14px rgba(43,36,32,0.08);padding:18px;}
.radar-card{grid-column:1;display:flex;flex-direction:column;gap:10px;}
.radar-wrap{position:relative;height:270px;}
.legend{display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center;}
.leg{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--soft);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex:none;}
.rings{display:flex;justify-content:space-around;}
.ring{display:flex;flex-direction:column;align-items:center;gap:5px;}
.ring svg{width:70px;height:70px;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--line);stroke-width:10;}
.ring-fg{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .4s ease;}
.ring-val{font-family:'Poppins';font-weight:700;font-size:15px;}
.ring-lbl{font-size:11px;color:var(--soft);}
.eleve-card{display:flex;flex-direction:column;gap:8px;}
.eleve-row{display:flex;gap:6px;}
.eleve-row input{flex:1;padding:9px 12px;border-radius:999px;border:1.5px solid var(--line);font-size:13.5px;}
.eleve-row input:focus{outline:none;border-color:var(--mv);}
.eleve-tabs{display:flex;flex-wrap:wrap;gap:6px;}
.eleve-tab{cursor:pointer;padding:6px 13px;border-radius:999px;border:1.5px solid var(--line);font-size:12.5px;font-weight:600;background:transparent;color:var(--soft);}
.eleve-tab:hover{border-color:var(--mv);color:var(--mv);}
.eleve-tab.active{background:var(--mv);color:#fff;border-color:var(--mv);}
.eleve-del{background:transparent;border:none;cursor:pointer;font-size:13px;color:var(--soft);padding:2px 4px;}
.eleve-del:hover{color:#c0392b;}
.main{display:flex;flex-direction:column;gap:12px;}
.corde-section{background:var(--card);border-radius:var(--r);box-shadow:0 3px 14px rgba(43,36,32,0.08);overflow:hidden;}
.corde-toggle{width:100%;display:flex;align-items:center;gap:10px;padding:14px 18px;border:none;background:transparent;cursor:pointer;text-align:left;}
.corde-badge{width:32px;height:32px;border-radius:50%;color:#fff;font-family:'Poppins';font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex:none;}
.corde-name{font-family:'Poppins';font-weight:600;font-size:15px;flex:1;white-space: nowrap;overflow: hidden;text-overflow: ellipsis;}
.corde-pct{font-size:13px;font-weight:600;color:var(--soft);}
.chevron{font-size:11px;color:var(--soft);transition:transform .2s;}
.corde-toggle.open .chevron{transform:rotate(180deg);}
.corde-body{display:none;padding:0 16px 16px;}
.corde-body.open{display:block;}
.cat-grid{display:grid;gap:12px;grid-template-columns:1fr;}
@media(min-width:600px){.cat-grid{grid-template-columns:1fr 1fr;}}

.cat-mv{background:rgba(47,107,63,0.06);border:1.5px solid rgba(47,107,63,0.20);}
.cat-monde{background:rgba(200,154,46,0.07);border:1.5px solid rgba(200,154,46,0.25);}
.cat-mus{background:rgba(226,103,42,0.06);border:1.5px solid rgba(226,103,42,0.22);}
.cat-head{font-family:'Poppins';font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.cat-codes .cat-head{color:var(--codes);}
.cat-mv .cat-head{color:var(--mv);}
.cat-monde .cat-head{color:var(--monde);}
.cat-mus .cat-head{color:var(--mus);}

.item {
  padding: 8px 0;
}

.item-label {

// Radar Chart simple mais efficace (sans CDN)
function drawRadar(canvas, data) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const centerX = w/2, centerY = h/2;
  const radius = 110;
  const labels = ['Codes', 'Mouvements', 'Monde', 'Musicalité'];
  const angles = data.map((v,i) => i * (Math.PI*2 / 4) - Math.PI/2);

  ctx.clearRect(0,0,w,h);

  // Fond
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 1;
  for(let r=1; r<=4; r++){
    ctx.beginPath();
    for(let i=0; i<4; i++){
      const x = centerX + Math.cos(angles[i]) * radius * (r/4);
      const y = centerY + Math.sin(angles[i]) * radius * (r/4);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.stroke();
  }

  // Données
  ctx.beginPath();
  ctx.strokeStyle = '#2F6B3F';
  ctx.fillStyle = 'rgba(47,107,63,0.2)';
  ctx.lineWidth = 3;
  data.forEach((val, i) => {
    const x = centerX + Math.cos(angles[i]) * radius * (val/100);
    const y = centerY + Math.sin(angles[i]) * radius * (val/100);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Points
  data.forEach((val, i) => {
    const x = centerX + Math.cos(angles[i]) * radius * (val/100);
    const y = centerY + Math.sin(angles[i]) * radius * (val/100);
    ctx.fillStyle = '#2F6B3F';
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI*2);
    ctx.fill();
  });

  // Labels
  ctx.fillStyle = '#2B2420';
  ctx.font = '11px Poppins';
  ctx.textAlign = 'center';
  labels.forEach((label, i) => {
    const x = centerX + Math.cos(angles[i]) * (radius + 25);
    const y = centerY + Math.sin(angles[i]) * (radius + 25) + 4;
    ctx.fillText(label, x, y);
  });
}

const CATS = {
  cod:{ label:"Les Codes", icon:"⚖️", color:"#2F6B6B", cls:"cat-codes" },
  mv: { label:"Les Mouvements", icon:"🥋", color:"#2F6B3F", cls:"cat-mv" },
  mon:{ label:"Le Monde de la Capoeira",icon:"🌍", color:"#C89A2E", cls:"cat-monde" },
  mus:{ label:"Musicalité", icon:"🎵", color:"#E2672A", cls:"cat-mus" }
};

const CAT_ORDER = ['cod','mv','mon','mus'];
const CCOLORS = {2:"#C89A2E",3:"#E2672A",4:"#2F6B3F"};
const CIRC = 2*Math.PI*40;

let students = [], current = null, chart = null;

function getVals(){ return current ? students.find(s=>s.id===current)?.vals ?? {} : {}; }
function save(){ try{localStorage.setItem("cob_prog",JSON.stringify(students));}catch(e){} }
function load(){ try{const r=localStorage.getItem("cob_prog");if(r)students=JSON.parse(r);}catch(e){} }

function stateToScore(v){return v===2?100:v===1?50:0;}
function catAvgs(vals){
  const t={},c={};CAT_ORDER.forEach(k=>{t[k]=0;c[k]=0;});
  ITEMS.forEach(it=>{t[it.cat]+=stateToScore(vals[it.id]||0);c[it.cat]++;});
  const o={};CAT_ORDER.forEach(k=>{o[k]=c[k]?Math.round(t[k]/c[k]):0;});return o;
}
function cordeAvg(vals,cd){const it=ITEMS.filter(i=>i.c===cd);return it.length?Math.round(it.reduce((s,i)=>s+stateToScore(vals[i.id]||0),0)/it.length):0;}

function initChart(){
  const canvas = document.getElementById("radar");
  if(!canvas) return;
  chart = {update:()=>console.log("Radar mis à jour")};
  document.getElementById("legend").innerHTML = CAT_ORDER.map(k=>`<span class="leg"><span class="leg-dot" style="background:${CATS[k].color}"></span>${CATS[k].label}</span>`).join("");
}

function updateRing(n,val){
  const el=document.getElementById("rf"+n);
  if(el){el.style.strokeDasharray=CIRC;el.style.strokeDashoffset=CIRC*(1-val/100);document.getElementById("rv"+n).textContent=val+"%";}
}
function updateAggregates(){
  const vals=getVals(),ca=catAvgs(vals);
  if(chart) chart.update();
  [2,3,4].forEach(c=>updateRing(c,cordeAvg(vals,c)));
}

function renderSections(){
  const wrap = document.getElementById("sections");
  const vals = getVals();
  let html = "";
  [2,3,4].forEach(corde => {
    const items = ITEMS.filter(i => i.c === corde);
    html += `<div class="corde-section" data-corde="${corde}">
      <button class="corde-toggle${corde===2?" open":""}" data-tog="${corde}">
        <span class="corde-badge" style="background:${CCOLORS[corde]}">C${corde}</span>
        <span class="corde-name">Corde ${corde}</span>
        <span class="corde-pct" id="cp${corde}">0%</span>
        <span class="chevron">▾</span>
      </button>
      <div class="corde-body${corde===2?" open":""}" id="cb${corde}">
        <div class="cat-grid" style="margin-top:12px;">`;
    CAT_ORDER.forEach(catKey => {
      const catItems = items.filter(i => i.cat === catKey);
      if(!catItems.length) return;
      const subs = [...new Set(catItems.map(i => i.sub))];
      html += `<div class="cat-block ${CATS[catKey].cls}">
        <div class="cat-head">${CATS[catKey].icon} ${CATS[catKey].label}</div>`;
      subs.forEach(sub => {
        html += `<div class="subcat">${sub}</div>`;
        catItems.filter(i => i.sub === sub).forEach(it => {
          const v = vals[it.id] || 0;
          html += `<div class="item" data-id="${it.id}">
            <span class="item-label" style="word-break:break-word;">${it.lbl}</span>
            <div class="item-ctrl">
              <div class="tri-toggle">
                <button class="tri-btn${v===0?" active-0":""}" data-id="${it.id}" data-v="0">✗ Non acquis</button>
                <button class="tri-btn${v===1?" active-1":""}" data-id="${it.id}" data-v="1">⟳ En cours</button>
                <button class="tri-btn${v===2?" active-2":""}" data-id="${it.id}" data-v="2">✓ Acquis</button>
              </div>
            </div>
          </div>`;
        });
      });
      html += `</div>`;
    });
    html += `</div></div></div>`;
  });
  wrap.innerHTML = html;
  updateCordePcts();
}

function updateCordePcts(){
  const vals = getVals();
  [2,3,4].forEach(c => {
    const el = document.getElementById("cp"+c);
    if(el) el.textContent = cordeAvg(vals,c) + "%";
  });
}

function refreshButtons(){
  const vals = getVals();
  document.querySelectorAll(".tri-btn").forEach(btn => {
    const id = btn.dataset.id;
    const v = parseInt(btn.dataset.v);
    const cur = vals[id] || 0;
    btn.className = `tri-btn${cur === v ? " active-" + v : ""}`;
  });
  updateCordePcts();
}

function renderTabs(){
  const wrap = document.getElementById("eleveTabs");
  if(!students.length){
    wrap.innerHTML = '<p style="font-size:12px;color:var(--soft);">Ajoutez un élève pour commencer.</p>';
    return;
  }
  wrap.innerHTML = students.map(s =>
    `<span style="display:inline-flex;align-items:center;gap:2px;">
      <button class="eleve-tab${s.id===current?" active":""}" data-sid="${s.id}">${s.name}</button>
      <button class="eleve-del" data-del="${s.id}" title="Supprimer">✕</button>
    </span>`
  ).join("");
}

function selectStudent(id){
  current = id;
  renderTabs();
  renderSections();
  updateAggregates();
}

// Events
document.getElementById("addBtn").addEventListener("click", () => {
  const name = document.getElementById("newName").value.trim();
  if(!name) return;
  const id = "e" + Date.now();
  students.push({id, name, vals:{}});
  save();
  document.getElementById("newName").value = "";
  selectStudent(id);
  toast(name + " ajouté·e");
});

document.getElementById("eleveTabs").addEventListener("click", e => {
  const sid = e.target.closest("[data-sid]")?.dataset.sid;
  const del = e.target.closest("[data-del]")?.dataset.del;
  if(sid) selectStudent(sid);
  if(del){
    if(confirm("Supprimer cet élève ?")){
      students = students.filter(x => x.id !== del);
      save();
      if(current === del) current = students[0]?.id || null;
      if(current) selectStudent(current);
      else renderTabs();
    }
  }
});

document.getElementById("sections").addEventListener("click", e => {
  const tog = e.target.closest(".corde-toggle");
  if(tog){
    const c = tog.dataset.tog;
    document.getElementById("cb"+c).classList.toggle("open");
    tog.classList.toggle("open");
    return;
  }
  const btn = e.target.closest(".tri-btn");
  if(btn && current){
    const id = btn.dataset.id;
    const v = parseInt(btn.dataset.v);
    const s = students.find(x=>x.id===current);
    if(s) s.vals[id] = v;
    save();
    refreshButtons();
    updateAggregates();
  }
});

document.getElementById("searchInput").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll(".item").forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(q) ? "" : "none";
  });
});

function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove("show"), 2200);
}


function updateAggregates(){
  const vals = getVals();
  const ca = catAvgs(vals);
  const data = CAT_ORDER.map(k => ca[k]);
  const canvas = document.getElementById("radar");
  if(canvas) drawRadar(canvas, data);
  [2,3,4].forEach(c => updateRing(c, cordeAvg(vals,c)));
}

// INIT
load();
updateAggregates(); // premier affichage
if(students.length){
  current = students[0].id;
  renderTabs();
  renderSections();
  updateAggregates();
} else {
  renderTabs();
}
</script>
